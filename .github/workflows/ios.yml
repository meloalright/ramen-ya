name: Build iOS & upload to TestFlight

# iOS builds need macOS + Xcode. Manual trigger only (macOS minutes are billed higher).
on:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  BUNDLE_ID: "meloalright.ramen-ya"
  PROFILE_NAME: "RAMEN-YA AppStore"
  SIGN_IDENTITY: "iPhone Distribution"

jobs:
  testflight:
    name: Export, sign & upload
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} + iOS export templates
        run: |
          set -eo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fL -o godot.zip      "$BASE/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          curl -fL -o templates.tpz  "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          xattr -dr com.apple.quarantine Godot.app || true
          GODOT_BIN="$PWD/Godot.app/Contents/MacOS/Godot"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          TPL="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL"
          unzip -q templates.tpz -d tpl
          mv tpl/templates/* "$TPL"/
          "$GODOT_BIN" --version

      - name: Import signing certificate & provisioning profile
        env:
          P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          P12_PASS: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          set -eo pipefail
          echo "$P12" | base64 --decode > /tmp/dist.p12
          KCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p actions "$KCHAIN"
          security set-keychain-settings -lut 21600 "$KCHAIN"
          security unlock-keychain -p actions "$KCHAIN"
          security import /tmp/dist.p12 -k "$KCHAIN" -P "$P12_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KCHAIN" >/dev/null
          security list-keychains -d user -s "$KCHAIN" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KCHAIN"
          PROF_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROF_DIR"
          echo "$PROFILE" | base64 --decode > "$PROF_DIR/ramenya.mobileprovision"
          rm -f /tmp/dist.p12

      - name: Set Team ID in iOS preset
        run: |
          # Team ID (from secret) + unique build number (CFBundleVersion = run number)
          sed -i '' "s#application/app_store_team_id=\"[^\"]*\"#application/app_store_team_id=\"${{ secrets.IOS_TEAM_ID }}\"#" export_presets.cfg
          sed -i '' "s#application/version=\"[^\"]*\"#application/version=\"${{ github.run_number }}\"#" export_presets.cfg
          grep -E 'version|team|provisioning' export_presets.cfg

      - name: Export & build signed .ipa (Godot drives xcodebuild)
        run: |
          set -eo pipefail
          "$GODOT_BIN" --headless --import || true
          mkdir -p build/ios
          # On macOS, Godot generates the Xcode project AND runs xcodebuild to
          # produce a signed .ipa (manual signing via the profile UUID in the preset).
          "$GODOT_BIN" --headless --verbose --export-release "iOS" build/ios/ramenya.ipa
          echo "--- build/ios ---"; ls -la build/ios
          find build/ios -name "*.ipa"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_P8" > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          IPA=$(find build/ios -name "*.ipa" | head -1)
          echo "Uploading $IPA"
          xcrun altool --validate-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" || true
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ramenya-ipa
          path: build/ios/**/*.ipa
          if-no-files-found: warn
