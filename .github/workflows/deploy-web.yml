name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# allow the job to push the built site to the gh-pages branch
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3"

jobs:
  export-web:
    name: Export Web build & deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Import project
        run: godot --headless --import || true

      - name: Export "Web" (release)
        run: |
          mkdir -p build
          godot --headless --verbose --export-release "Web" build/index.html

      - name: Cache-bust assets (sha-suffixed filenames)
        run: |
          cd build
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          for f in index.*; do
            [ "$f" = "index.html" ] && continue
            mv "$f" "${f/index./index.$SHA.}"
          done
          sed -i "s/index\./index.$SHA./g" index.html
          sed -i "s/\"executable\":\"index\"/\"executable\":\"index.$SHA\"/" index.html
          echo "rewrote references to index.$SHA.*"

      - name: Prepare site for static hosting
        run: |
          rm -f build/*.import build/.gitkeep
          touch build/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true
